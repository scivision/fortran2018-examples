name: cmake

env:
  HOMEBREW_NO_INSTALL_CLEANUP: 1

on:
  push:
    paths:
      - "**.f90"
      - "**.F90"
      - "**.cmake"
      - "**/CMakeLists.txt"
      - ".github/workflows/cmake.yml"
  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:


  gcc-new:
    strategy:
      matrix:
        fc: [12, 13, 14]

    runs-on: ubuntu-24.04

    env:
      FC: gfortran-${{ matrix.fc }}

    steps:
    - &checkout
      uses: actions/checkout@v6

    - if: matrix.fc >= 14
      run: cmake --workflow debug

    - &default
      run: cmake --workflow default


  gcc-old:
    strategy:
      matrix:
        os: [ubuntu-22.04]
        gcc-version: [10, 11]
  # gfortran-9 works, dropped to save CI time

    runs-on: ${{ matrix.os }}

    env:
      FC: gfortran-${{ matrix.gcc-version }}

    steps:

    - name: GCC APT
      if: matrix.gcc-version < 10
      run: |
        sudo apt update -y
        sudo apt install -y --no-install-recommends gfortran-${{ matrix.gcc-version }}

    - *checkout

    - *default

  macos:
    strategy:
      matrix:
        fc: [gfortran-15, flang]

    runs-on: macos-latest

    env:
      FC: ${{ matrix.fc }}

    steps:
    - &checkout
      uses: actions/checkout@v6

    - if: matrix.fc == 'flang'
      run: brew install flang

    - run: cmake --workflow debug

    - *default


  windows:
    runs-on: windows-latest
    timeout-minutes: 10

    env:
      CMAKE_GENERATOR: Ninja

    steps:
    - uses: msys2/setup-msys2@v2
      id: msys2
      with:
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc-fortran

    - name: Put MSYS2_MinGW64 on PATH
      run: echo "${{ steps.msys2.outputs.msys2-location }}/ucrt64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - *checkout

    - *default
